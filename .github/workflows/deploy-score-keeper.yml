name: Deploy Score Keeper

on:
  push:
    branches: [master, claude/odin-score-keeper-gQlUk]
    paths: [OdinScoreKeeper/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: OdinScoreKeeper/package-lock.json
      - run: npm ci
        working-directory: OdinScoreKeeper
      - run: npm run build
        working-directory: OdinScoreKeeper
        env:
          VITE_BASE_PATH: /monodroid-samples/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: OdinScoreKeeper/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
